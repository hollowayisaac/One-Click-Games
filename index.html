<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railroad Crossing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    canvas {
      border-radius: 10px;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
      max-width: 100vw;
    }
    #hint {
      color: #555;
      font-size: 13px;
      margin-top: 10px;
      letter-spacing: 1px;
    }
    #hint b { color: #aaa; }
  </style>
</head>
<body>
  <canvas id="c" width="800" height="500"></canvas>
  <div id="hint"><b>SPACE</b> or <b>CLICK</b> to operate the crossing gate</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 500;

// ── Layout ────────────────────────────────────────────────
const ROAD_Y1  = 210, ROAD_Y2 = 290;
const ROAD_CY  = (ROAD_Y1 + ROAD_Y2) / 2;   // 250
const LANE1_Y  = ROAD_Y1 + 22;               // right-going cars  (y=232)
const LANE2_Y  = ROAD_Y2 - 22;               // left-going cars   (y=268)
const TK_CX    = 400;
const TK_HALF  = 27;
const TK_L     = TK_CX - TK_HALF;            // 373
const TK_R     = TK_CX + TK_HALF;            // 427
const ARM_LEN  = 158;
const GATE_L_X = TK_L - 12;                  // 361 — left gate pivot
const GATE_R_X = TK_R + 12;                  // 439 — right gate pivot
const GATE_Y   = ROAD_CY;

// ── State factory ─────────────────────────────────────────
function newGame() {
  return {
    phase: 'title',   // title | play | over
    score: 0,
    lives: 3,
    gAngle: 70,       // 70 = up/open, 0 = horizontal/blocking
    gTarget: 70,
    gateLocked: false,
    train: null,
    cars: [],
    flash: false,
    flashTick: 0,
    nextTrainIn: 220,
    carTick: 50,
    msg: '', msgTick: 0,
  };
}
let G = newGame();

// ── Helpers ───────────────────────────────────────────────
const gateUp   = () => G.gAngle > 65;
const gateDown = () => G.gAngle < 5;

function showMsg(t, dur = 90) { G.msg = t; G.msgTick = dur; }

function loseLife() {
  G.lives--;
  if (G.lives <= 0) G.phase = 'over';
}

function spawnTrain() {
  G.train = { y: -280, speed: 2.8, h: 210, cleared: false };
  G.nextTrainIn = 260 + Math.random() * 180 | 0;
}

function spawnCar() {
  const right = Math.random() < 0.5;
  const colors = ['#e74c3c','#e67e22','#3498db','#2ecc71','#9b59b6','#1abc9c','#f39c12','#e91e63','#00bcd4'];
  G.cars.push({
    x: right ? -50 : W + 50,
    y: right ? LANE1_Y : LANE2_Y,
    vx: right ? 1.8 : -1.8,
    color: colors[Math.random() * colors.length | 0],
    right,
    scored: false,
    boom: false,
  });
}

// ── Input ─────────────────────────────────────────────────
function operate() {
  if (G.phase === 'title') { G.phase = 'play'; return; }
  if (G.phase === 'over')  { G = newGame(); G.phase = 'play'; return; }
  if (G.gateLocked) { showMsg('⚠  Gate locked — train is crossing!'); return; }

  if (gateUp()) {
    G.gTarget = 0;                          // lower the gate
  } else if (gateDown()) {
    if (G.train && !G.train.cleared) {
      showMsg('💥  Wait for the train to pass!');
      loseLife();
    } else {
      G.gTarget = 70;                       // raise the gate
      G.score += 15;
      showMsg('+15  Nice timing!');
    }
  }
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); operate(); } });
canvas.addEventListener('click', operate);

// ── Update ────────────────────────────────────────────────
function update() {
  if (G.phase !== 'play') return;

  // Animate gate angle
  G.gAngle += (G.gTarget - G.gAngle) * 0.09;

  // Flashing warning lights
  const trainWarning = G.train && !G.train.cleared;
  if (trainWarning) {
    if (++G.flashTick > 13) { G.flashTick = 0; G.flash = !G.flash; }
  } else {
    G.flash = false; G.flashTick = 0;
  }

  // Spawn cars
  if (--G.carTick <= 0) {
    spawnCar();
    G.carTick = 65 + (Math.random() * 55 | 0);
  }

  // Move cars
  const stopL = TK_L - 28;   // right-going cars stop here (center x)
  const stopR = TK_R + 28;   // left-going cars stop here (center x)

  for (const car of G.cars) {
    if (car.boom) continue;

    if (!gateUp()) {
      // Gate lowering or down — cars approach stop line and wait
      if (car.right) {
        if (car.x < stopL) {
          const dist = stopL - car.x;
          car.vx = dist > 50 ? 1.8 : Math.max(0, dist * 0.06);
        }
        // if already past stop line (gate dropped while car was in crossing), keep going
        car.x += car.vx;
      } else {
        if (car.x > stopR) {
          const dist = car.x - stopR;
          car.vx = dist > 50 ? -1.8 : Math.min(0, -dist * 0.06);
        }
        car.x += car.vx;
      }
    } else {
      car.vx = car.right ? 1.8 : -1.8;
      car.x += car.vx;
    }

    // Award points when car clears the crossing
    if (!car.scored) {
      if ( car.right && car.x > TK_R + 30) { car.scored = true; G.score += 5; }
      if (!car.right && car.x < TK_L - 30) { car.scored = true; G.score += 5; }
    }
  }
  G.cars = G.cars.filter(c => c.x > -80 && c.x < W + 80);

  // Spawn train
  if (!G.train && --G.nextTrainIn <= 0) spawnTrain();

  // Move train
  if (G.train) {
    G.train.y += G.train.speed;
    const tT = G.train.y, tB = G.train.y + G.train.h;
    const tL = TK_CX - 25, tR = TK_CX + 25;

    // Lock gate while train occupies the road
    G.gateLocked = tB > ROAD_Y1 && tT < ROAD_Y2;

    // Collision check — any car inside the crossing zone?
    if (G.gateLocked) {
      for (const car of G.cars) {
        if (car.boom) continue;
        if (car.x + 20 > tL && car.x - 20 < tR) {
          car.boom = true;
          showMsg('💥  Car hit! Lower the gate in time!', 110);
          loseLife();
        }
      }
    }

    // Mark cleared once train front is past the road bottom
    if (tT > ROAD_Y2 && !G.train.cleared) G.train.cleared = true;

    // Remove train when off screen
    if (tT > H + 20) G.train = null;
  }

  if (G.msgTick > 0) G.msgTick--;
}

// ── Draw helpers ──────────────────────────────────────────
function fillRect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
function dot(x, y, r, c) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = c; ctx.fill(); }

function txt(s, x, y, sz, c, align = 'center') {
  ctx.font = `${sz}px 'Courier New', monospace`;
  ctx.fillStyle = c;
  ctx.textAlign = align;
  ctx.fillText(s, x, y);
}

// ── Draw ──────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grass
  fillRect(0, 0, W, H, '#28581a');

  // Road
  fillRect(0, ROAD_Y1, W, ROAD_Y2 - ROAD_Y1, '#494949');

  // Road edge lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(0, ROAD_Y1); ctx.lineTo(W, ROAD_Y1);
  ctx.moveTo(0, ROAD_Y2); ctx.lineTo(W, ROAD_Y2);
  ctx.stroke();

  // Center dash
  ctx.strokeStyle = '#fffa';
  ctx.lineWidth = 2;
  ctx.setLineDash([22, 16]);
  ctx.beginPath();
  ctx.moveTo(0, ROAD_CY); ctx.lineTo(W, ROAD_CY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Stop bars (white dashed vertical lines near tracks)
  ctx.strokeStyle = '#fffb';
  ctx.lineWidth = 3;
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(stopBar_L, ROAD_Y1); ctx.lineTo(stopBar_L, ROAD_Y2);
  ctx.moveTo(stopBar_R, ROAD_Y1); ctx.lineTo(stopBar_R, ROAD_Y2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Track ballast
  fillRect(TK_L - 10, 0, TK_HALF * 2 + 20, H, '#9b8b78');

  // Ties
  ctx.fillStyle = '#6b4526';
  for (let y = -5; y < H + 20; y += 20) ctx.fillRect(TK_L - 16, y, TK_HALF * 2 + 32, 10);

  // Rails
  fillRect(TK_L + 2,  0, 7, H, '#aaa');
  fillRect(TK_R - 9,  0, 7, H, '#aaa');

  // Train
  if (G.train) drawTrain(G.train);

  // Cars
  for (const car of G.cars) drawCar(car);

  // Gate structures (drawn on top of cars, but train is drawn before)
  drawGates();

  // HUD
  fillRect(0, 0, W, 38, '#000000bb');
  txt(`Score: ${G.score}`, 14, 25, 15, '#7fff7f', 'left');
  txt('RAILROAD CROSSING', W / 2, 25, 15, '#ffd700', 'center');
  const hearts = '♥'.repeat(G.lives) + '♡'.repeat(Math.max(0, 3 - G.lives));
  txt(hearts, W - 14, 25, 16, '#ff5555', 'right');

  // Floating message
  if (G.msgTick > 0) {
    ctx.globalAlpha = Math.min(1, G.msgTick / 20);
    txt(G.msg, W / 2, 170, 20, '#fff');
    ctx.globalAlpha = 1;
  }

  // Overlays
  if (G.phase !== 'play') drawOverlay();
}

const stopBar_L = TK_L - 22;
const stopBar_R = TK_R + 22;

function drawTrain(t) {
  const x = TK_CX - 25, y = t.y, w = 50, h = t.h;

  // Body
  fillRect(x, y, w, h, '#1c1c2a');

  // Locomotive cab (front = top, train going down)
  fillRect(x + 3, y + 3, w - 6, 42, '#2c2c3c');
  fillRect(x + 7, y + 9, w - 14, 24, '#c0392b');  // red stripe
  dot(x + w / 2, y + 6, 5, '#eee');               // headlight

  // Wagon segments
  for (let i = 0; i < 3; i++) {
    const wy = y + 52 + i * 52;
    fillRect(x + 2, wy, w - 4, 46, '#22303e');
    fillRect(x + 6, wy + 5, w - 12, 32, '#1a2530');
    // windows
    fillRect(x + 8,  wy + 8, 10, 8, '#4a7a8a');
    fillRect(x + 22, wy + 8, 10, 8, '#4a7a8a');
    fillRect(x + 8,  wy + 22, 10, 8, '#4a7a8a');
    fillRect(x + 22, wy + 22, 10, 8, '#4a7a8a');
  }

  // Wheels (side flanges)
  for (let wy = y + 8; wy < y + h - 10; wy += 48) {
    fillRect(x - 4, wy, 5, 18, '#555');
    fillRect(x + w - 1, wy, 5, 18, '#555');
  }
}

function drawCar(car) {
  if (car.boom) {
    // Explosion
    dot(car.x, car.y, 20, '#f39c1266');
    dot(car.x, car.y, 13, '#e74c3c');
    dot(car.x, car.y, 7,  '#ffd700');
    return;
  }
  const cx = car.x, cy = car.y;

  // Body
  ctx.fillStyle = car.color;
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(cx - 21, cy - 10, 42, 20, 5);
  } else {
    ctx.rect(cx - 21, cy - 10, 42, 20);
  }
  ctx.fill();

  // Windshield
  fillRect(cx - 11, cy - 7, 9, 10, '#a8d8ea');
  fillRect(cx + 2,  cy - 7, 9, 10, '#a8d8ea');

  // Headlights
  const hx = car.right ? cx + 20 : cx - 20;
  dot(hx, cy - 4, 2.5, '#fffbb0');
  dot(hx, cy + 4, 2.5, '#fffbb0');
}

function drawGates() {
  const angle = G.gAngle * Math.PI / 180;

  for (const side of ['left', 'right']) {
    const px  = side === 'left' ? GATE_L_X : GATE_R_X;
    const dir = side === 'left' ? -1 : 1;

    // Post
    fillRect(px - 4, ROAD_Y1 - 38, 8, ROAD_Y2 - ROAD_Y1 + 38, '#ddd');

    // Light housing box
    fillRect(px - 11, ROAD_Y1 - 40, 22, 28, '#222');

    // Flashing lights (two, alternate)
    const active = G.train && !G.train.cleared;
    dot(px, ROAD_Y1 - 33, 7, active &&  G.flash ? '#ff1100' : '#3a0000');
    dot(px, ROAD_Y1 - 20, 7, active && !G.flash ? '#ff1100' : '#3a0000');

    // Gate arm — striped
    const SEGS = 12;
    ctx.lineWidth = 8;
    ctx.lineCap = 'butt';
    for (let i = 0; i < SEGS; i++) {
      const t0 = i / SEGS, t1 = (i + 0.92) / SEGS;
      ctx.strokeStyle = i % 2 === 0 ? '#e74c3c' : '#eee';
      ctx.beginPath();
      ctx.moveTo(px + dir * ARM_LEN * Math.cos(angle) * t0,
                 GATE_Y - ARM_LEN * Math.sin(angle) * t0);
      ctx.lineTo(px + dir * ARM_LEN * Math.cos(angle) * t1,
                 GATE_Y - ARM_LEN * Math.sin(angle) * t1);
      ctx.stroke();
    }
    // Tip
    dot(px + dir * ARM_LEN * Math.cos(angle),
        GATE_Y - ARM_LEN * Math.sin(angle),
        5, '#e74c3c');
  }
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  if (G.phase === 'title') {
    txt('🚂  RAILROAD CROSSING', W / 2, 165, 28, '#ffd700');
    txt('You operate the crossing gate.', W / 2, 215, 15, '#bbb');
    txt('Lower it before the train arrives.', W / 2, 238, 15, '#bbb');
    txt('Raise it again after the train clears.', W / 2, 261, 15, '#bbb');
    txt("Don't let any cars get hit!", W / 2, 284, 15, '#ff7777');
    txt('+5 per car that passes   +15 for good timing', W / 2, 320, 14, '#888');
    txt('▶  SPACE or CLICK to start', W / 2, 370, 18, '#7fff7f');
  } else {
    txt('GAME OVER', W / 2, 195, 44, '#ff4444');
    txt(`Final Score: ${G.score}`, W / 2, 258, 26, '#ffd700');
    txt('▶  SPACE or CLICK to retry', W / 2, 330, 18, '#7fff7f');
  }
}

// ── Loop ──────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
