<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Rescue 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
body { background:#000; overflow:hidden; font-family:Arial,sans-serif; -webkit-touch-callout:none; }
canvas { display:block; }

#hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 24px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
  pointer-events:none; color:#fff;
}
#score-box { font-size:28px; font-weight:bold; text-shadow:0 2px 6px #000; }
#title-box { font-size:22px; font-weight:bold; color:#ff6600; text-shadow:0 0 10px #ff4400, 0 2px 6px #000; }
#lives-box { font-size:26px; letter-spacing:4px; text-shadow:0 2px 6px #000; }

#cam-hint {
  position:absolute; top:68px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.5); font-size:13px; pointer-events:none;
  text-shadow:0 1px 4px #000;
}

#tank-wrap {
  position:absolute; bottom:58px; left:50%; transform:translateX(-50%);
  width:220px; pointer-events:none; text-align:center;
}
#tank-label { color:#aaddff; font-size:13px; letter-spacing:1px; margin-bottom:5px; }
#tank-bg { background:rgba(0,0,0,0.5); border-radius:10px; height:14px; border:1px solid #446; overflow:hidden; }
#tank-bar { height:100%; width:100%; background:linear-gradient(to right,#2299ff,#88ddff); border-radius:10px; }

#hint {
  position:absolute; bottom:20px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,0.6); font-size:16px;
  pointer-events:none; text-shadow:0 1px 4px #000;
}
#hint b { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:5px; padding:2px 10px; }

#gameover {
  display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; color:#fff; background:rgba(0,0,0,0.88);
  padding:48px 60px; border-radius:20px;
  border:2px solid #ff4400; box-shadow:0 0 40px rgba(255,80,0,0.4);
}
#gameover h1 { font-size:52px; color:#ff4400; margin-bottom:14px; }
#gameover .fin { font-size:32px; color:#ffd700; font-weight:bold; margin-bottom:28px; }
#gameover .key { font-size:18px; color:#aaddff; }
#gameover .key b { background:rgba(255,255,255,0.1); border:1px solid #aaddff; border-radius:6px; padding:2px 12px; }
</style>
</head>
<body>

<div id="hud">
  <div id="score-box">Score: <span id="sval">0</span></div>
  <!-- VERSION: v1.0 — increment by 0.1 each time this file is updated via Claude Code -->
  <div id="title-box">🚒 FIRE RESCUE <span style="font-size:14px;opacity:0.7;font-weight:normal;">v1.0</span></div>
  <div id="lives-box" id="lval">❤️❤️❤️</div>
</div>
<div id="cam-hint">Drag to rotate • Scroll / Right-drag to zoom</div>

<div id="tank-wrap">
  <div id="tank-label">WATER TANK</div>
  <div id="tank-bg"><div id="tank-bar"></div></div>
</div>
<div id="hint">Hold <b>SPACEBAR</b> or <b>LEFT CLICK</b> to spray water!</div>

<div id="gameover">
  <h1>GAME OVER</h1>
  <div class="fin" id="fin-score">Score: 0</div>
  <div class="key">Press <b>SPACEBAR</b> to play again</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── Scene setup ──────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0xc8e8ff, 0.012);

const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 500);
camera.position.set(50, 10, -10);
camera.lookAt(38, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xfff5e0, 0.5));
const sun = new THREE.DirectionalLight(0xfff5cc, 1.2);
sun.position.set(60, 120, 40);
sun.castShadow = true;
sun.shadow.mapSize.width = sun.shadow.mapSize.height = 1024;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 300;
sun.shadow.camera.left = sun.shadow.camera.bottom = -80;
sun.shadow.camera.right = sun.shadow.camera.top = 80;
scene.add(sun);

// ── Ground ───────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshLambertMaterial({ color: 0x3a7a30 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ── Road ring ────────────────────────────────────────────────────────
const ROAD_R = 38, ROAD_W = 7;
const road = new THREE.Mesh(
  new THREE.RingGeometry(ROAD_R - ROAD_W, ROAD_R + ROAD_W, 80),
  new THREE.MeshLambertMaterial({ color: 0x2a2a2a })
);
road.rotation.x = -Math.PI / 2;
road.position.y = 0.02;
scene.add(road);

for (let i = 0; i < 24; i++) {
  const a = (i / 24) * Math.PI * 2;
  const dash = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5, 2.5),
    new THREE.MeshBasicMaterial({ color: 0xffff00 })
  );
  dash.rotation.x = -Math.PI / 2;
  dash.rotation.z = -a;
  dash.position.set(Math.cos(a) * ROAD_R, 0.03, Math.sin(a) * ROAD_R);
  scene.add(dash);
}

// ── Park ─────────────────────────────────────────────────────────────
const park = new THREE.Mesh(
  new THREE.CircleGeometry(ROAD_R - ROAD_W - 1, 64),
  new THREE.MeshLambertMaterial({ color: 0x4a9a40 })
);
park.rotation.x = -Math.PI / 2;
park.position.y = 0.02;
scene.add(park);

const fBase = new THREE.Mesh(
  new THREE.CylinderGeometry(4, 4.5, 0.8, 24),
  new THREE.MeshLambertMaterial({ color: 0x9090a0 })
);
fBase.position.set(0, 0.4, 0);
scene.add(fBase);

const fPillar = new THREE.Mesh(
  new THREE.CylinderGeometry(0.4, 0.6, 3, 12),
  new THREE.MeshLambertMaterial({ color: 0xa0a0b0 })
);
fPillar.position.set(0, 2, 0);
scene.add(fPillar);

for (let i = 0; i < 10; i++) {
  const a = (i / 10) * Math.PI * 2;
  const r = 8 + Math.random() * 8;
  const x = Math.cos(a) * r, z = Math.sin(a) * r;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 1.5, 6),
    new THREE.MeshLambertMaterial({ color: 0x6b4523 })
  );
  trunk.position.set(x, 0.75, z);
  trunk.castShadow = true;
  scene.add(trunk);
  const leaves = new THREE.Mesh(
    new THREE.ConeGeometry(1.4, 3.5, 8),
    new THREE.MeshLambertMaterial({ color: 0x2a6a25 })
  );
  leaves.position.set(x, 3.5, z);
  leaves.castShadow = true;
  scene.add(leaves);
}

// ── Buildings ────────────────────────────────────────────────────────
const BCOLORS = [0xcc8844, 0x8899aa, 0xaabb88, 0xbbaa99, 0x9988bb, 0xcc9977, 0x7799cc];
const buildingData = [];

for (let i = 0; i < 18; i++) {
  const a = (i / 18) * Math.PI * 2;
  const dist = ROAD_R + ROAD_W + 7 + Math.random() * 8;
  const x = Math.cos(a) * dist;
  const z = Math.sin(a) * dist;
  const w = 4.5 + Math.random() * 3;
  const d = 4.5 + Math.random() * 3;
  const h = 7 + Math.random() * 14;
  const color = BCOLORS[i % BCOLORS.length];

  const mat = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Windows (face toward center)
  const rows = Math.floor(h / 2.5), cols = Math.floor(w / 2);
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const win = new THREE.Mesh(
        new THREE.PlaneGeometry(0.8, 0.9),
        new THREE.MeshBasicMaterial({ color: Math.random() < 0.3 ? 0xffee99 : 0xaaccff })
      );
      win.position.set(x + (col - cols / 2 + 0.5) * 2, 1.5 + row * 2.5, z + d / 2 + 0.02);
      scene.add(win);
    }
  }

  const rh = 1.5 + Math.random() * 2;
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(Math.max(w, d) * 0.65, rh, 4),
    new THREE.MeshLambertMaterial({ color: 0x7a3a14 })
  );
  roof.position.set(x, h + rh / 2, z);
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  scene.add(roof);

  buildingData.push({ x, z, h, w, d, mat, origColor: color });
}

// ── Firetruck ────────────────────────────────────────────────────────
const truck = new THREE.Group();

function addBox(group, w, h, d, color, px, py, pz) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(px, py, pz);
  m.castShadow = true;
  group.add(m);
  return m;
}

addBox(truck, 2.8, 1.4, 6.5, 0xdd1111, 0, 1.4, -0.3);   // body
addBox(truck, 2.8, 1.6, 2.2, 0xaa0a0a, 0, 2.4, 1.7);    // cab
addBox(truck, 2.6, 0.3, 2.0, 0xcc0808, 0, 3.25, 1.7);   // cab top
addBox(truck, 0.5, 1.1, 4.5, 0xcc2200, -1.65, 1.1, -0.5); // hose box L
addBox(truck, 0.5, 1.1, 4.5, 0xcc2200,  1.65, 1.1, -0.5); // hose box R
addBox(truck, 0.3, 0.2, 5.5, 0xcccccc,  0.7, 2.25, -0.5); // ladder rail R
addBox(truck, 0.3, 0.2, 5.5, 0xcccccc, -0.7, 2.25, -0.5); // ladder rail L
for (let i = 0; i < 8; i++) addBox(truck, 1.4, 0.12, 0.12, 0xcccccc, 0, 2.35, -2.8 + i * 0.8);
addBox(truck, 2.4, 0.3, 6.5, 0x222222, 0, 0.15, -0.3);  // chassis
addBox(truck, 2.2, 0.22, 0.6, 0x222222, 0, 3.4, 1.7);   // light bar

// Windshield
const ws = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 1.0), new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 }));
ws.position.set(0, 2.5, 2.82);
truck.add(ws);

// Wheels
const wGeo = new THREE.CylinderGeometry(0.65, 0.65, 0.45, 16);
const wMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
const hGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.5, 8);
const hMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
[[-1.55,0.65,2.2],[1.55,0.65,2.2],[-1.55,0.65,0],[1.55,0.65,0],[-1.55,0.65,-2],[1.55,0.65,-2]].forEach(([px,py,pz]) => {
  const w = new THREE.Mesh(wGeo, wMat); w.rotation.z = Math.PI / 2; w.position.set(px, py, pz); w.castShadow = true; truck.add(w);
  const h = new THREE.Mesh(hGeo, hMat); h.rotation.z = Math.PI / 2; h.position.set(px, py, pz); truck.add(h);
});

// Emergency lights
const redBulb  = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
redBulb.position.set(-0.6, 3.55, 1.7); truck.add(redBulb);
const blueBulb = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), new THREE.MeshBasicMaterial({ color: 0x2244ff }));
blueBulb.position.set( 0.6, 3.55, 1.7); truck.add(blueBulb);

// Cannon pivot
const cannonPivot = new THREE.Group();
cannonPivot.position.set(0, 2.9, -0.5);
truck.add(cannonPivot);

const cannonBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.14, 1.2, 10), new THREE.MeshLambertMaterial({ color: 0xcccccc }));
cannonBarrel.rotation.x = -Math.PI / 2 + 0.45;
cannonBarrel.position.set(0, 0.1, -0.4);
cannonPivot.add(cannonBarrel);

const nozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, 0.3, 8), new THREE.MeshLambertMaterial({ color: 0x333333 }));
nozzle.rotation.x = -Math.PI / 2 + 0.45;
nozzle.position.set(0, 0.5, -0.9);
cannonPivot.add(nozzle);

scene.add(truck);

// Nozzle spray glow
const nozzleGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.6, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x88eeff, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false })
);
nozzleGlow.visible = false;
scene.add(nozzleGlow);
const nozzleLight = new THREE.PointLight(0x44bbff, 0, 14);
scene.add(nozzleLight);

// ── Water stream arc (3 offset lines) ───────────────────────────────
const SNPTS = 26;
const streamLines = [0xffffff, 0x88ddff, 0x44aaff].map((col, i) => {
  const buf = new Float32Array(SNPTS * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
  geo.setDrawRange(0, SNPTS);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.9 - i * 0.2 }));
  line.visible = false;
  scene.add(line);
  return line;
});

const offsets = [[0,0,0],[0.12,0.05,0],[-0.1,0.09,0]];

function updateStream(npos, outDir) {
  streamLines.forEach((line, li) => {
    const arr = line.geometry.attributes.position.array;
    const ox = offsets[li][0], oy = offsets[li][1], oz = offsets[li][2];
    let vx = outDir.x * 0.95, vy = 0.32, vz = outDir.z * 0.95;
    let px = npos.x + ox, py = npos.y + oy, pz = npos.z + oz;
    let n = 0;
    for (let i = 0; i < SNPTS; i++) {
      arr[i*3] = px; arr[i*3+1] = py; arr[i*3+2] = pz;
      vy -= 0.013; px += vx; py += vy; pz += vz; n++;
      if (py < 0.3) break;
    }
    line.geometry.setDrawRange(0, n);
    line.geometry.attributes.position.needsUpdate = true;
    line.visible = true;
  });
}

function hideStream() { streamLines.forEach(l => l.visible = false); }

// ── Particle pools ───────────────────────────────────────────────────
const waterPool = [];
const wGeo2 = new THREE.SphereGeometry(0.38, 6, 6);

function getWater() {
  for (const w of waterPool) {
    if (!w.active) { w.active = true; w.mesh.visible = true; return w; }
  }
  const mesh = new THREE.Mesh(wGeo2, new THREE.MeshBasicMaterial({
    color: 0xaaeeff, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  scene.add(mesh);
  const obj = { mesh, active: true, vx: 0, vy: 0, vz: 0, life: 0 };
  waterPool.push(obj);
  return obj;
}

function spawnWater(npos, outDir) {
  const wp = getWater();
  wp.mesh.position.copy(npos);
  const sx = (Math.random() - 0.5) * 0.6;
  const sy = 0.18 + Math.random() * 0.32;
  const sz = (Math.random() - 0.5) * 0.6;
  const spd = 0.92 + Math.random() * 0.38;
  wp.vx = outDir.x * spd + sx;
  wp.vy = sy;
  wp.vz = outDir.z * spd + sz;
  wp.life = 1.0;
  wp.mesh.material.opacity = 1.0;
}

const smokePool = [];
const sGeo = new THREE.SphereGeometry(0.5, 6, 6);

function getSmoke() {
  for (const s of smokePool) {
    if (!s.active) { s.active = true; s.mesh.visible = true; return s; }
  }
  const mesh = new THREE.Mesh(sGeo, new THREE.MeshBasicMaterial({ transparent: true, color: 0x888888 }));
  scene.add(mesh);
  const obj = { mesh, active: true, vx: 0, vy: 0, vz: 0, life: 0, scale0: 1 };
  smokePool.push(obj);
  return obj;
}

function spawnSmoke(x, y, z, col) {
  const sm = getSmoke();
  sm.mesh.material.color.setHex(col || 0x888888);
  sm.mesh.position.set(x + (Math.random()-0.5)*1.5, y + 0.5, z + (Math.random()-0.5)*1.5);
  sm.vx = (Math.random()-0.5)*0.04;
  sm.vy = 0.05 + Math.random()*0.06;
  sm.vz = (Math.random()-0.5)*0.04;
  sm.life = 1.0;
  sm.scale0 = 0.4 + Math.random()*0.4;
  sm.mesh.scale.setScalar(sm.scale0);
}

function spawnSteam(x, y, z) {
  const sm = getSmoke();
  sm.mesh.material.color.setHex(0xddeeff);
  sm.mesh.position.set(x + (Math.random()-0.5)*3, y + Math.random()*3, z + (Math.random()-0.5)*3);
  sm.vx = (Math.random()-0.5)*0.12;
  sm.vy = 0.14 + Math.random()*0.18;
  sm.vz = (Math.random()-0.5)*0.12;
  sm.life = 1.0;
  sm.scale0 = 0.9 + Math.random()*0.8;
  sm.mesh.scale.setScalar(sm.scale0);
}

function spawnSplash(x, y, z) {
  const wp = getWater();
  wp.mesh.position.set(x, y, z);
  const a = Math.random() * Math.PI * 2;
  const spd = 0.25 + Math.random() * 0.35;
  wp.vx = Math.cos(a) * spd;
  wp.vy = 0.2 + Math.random() * 0.35;
  wp.vz = Math.sin(a) * spd;
  wp.life = 0.8;
  wp.mesh.material.opacity = 1.0;
}

// ── Fires ────────────────────────────────────────────────────────────
const fires = [];

function spawnFire() {
  if (fires.length >= 6) return;
  const bIdx = Math.floor(Math.random() * buildingData.length);
  if (fires.some(f => f.bIdx === bIdx)) return;
  const bd = buildingData[bIdx];

  // Group origin at the center of the building so flames span the full structure
  const group = new THREE.Group();
  group.position.set(bd.x, bd.h / 2, bd.z);
  scene.add(group);

  const flameP = [];
  // Cone-shaped flame tongues with additive blending — tip points up by default
  for (let i = 0; i < 56; i++) {
    const coneH = 2.0 + Math.random() * 5.0;
    const coneR = 0.3 + Math.random() * 0.7;
    const fl = new THREE.Mesh(
      new THREE.ConeGeometry(coneR, coneH, 7),
      new THREE.MeshBasicMaterial({
        color: 0xff3300, transparent: true, opacity: 0.9,
        blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
    fl.position.set(
      (Math.random() - 0.5) * bd.w * 0.98,
      (Math.random() - 0.5) * bd.h,
      (Math.random() - 0.5) * bd.d * 0.98
    );
    fl.userData.ox    = fl.position.x;
    fl.userData.oy    = fl.position.y;
    fl.userData.oz    = fl.position.z;
    fl.userData.phase = Math.random() * Math.PI * 2;
    fl.userData.spd   = 3 + Math.random() * 5;
    group.add(fl); flameP.push(fl);
  }
  // Extra ember sparks — small fast cones near the top
  for (let i = 0; i < 20; i++) {
    const fl = new THREE.Mesh(
      new THREE.ConeGeometry(0.12 + Math.random() * 0.18, 1.2 + Math.random() * 1.8, 5),
      new THREE.MeshBasicMaterial({
        color: 0xffaa00, transparent: true, opacity: 0.85,
        blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
    fl.position.set(
      (Math.random() - 0.5) * bd.w * 0.7,
      bd.h * 0.3 + Math.random() * bd.h * 0.5,
      (Math.random() - 0.5) * bd.d * 0.7
    );
    fl.userData.ox    = fl.position.x;
    fl.userData.oy    = fl.position.y;
    fl.userData.oz    = fl.position.z;
    fl.userData.phase = Math.random() * Math.PI * 2;
    fl.userData.spd   = 6 + Math.random() * 6;
    group.add(fl); flameP.push(fl);
  }
  const glow = new THREE.PointLight(0xff6600, 8, 55);
  group.add(glow);

  // Tint building red while on fire
  bd.mat.color.setHex(0xcc2200);

  const hitRadius = Math.max(bd.w, bd.d, bd.h) * 0.75;
  fires.push({ group, flameP, glow, bIdx, health: 100, age: 0, hitRadius, bdH: bd.h });
}

// ── Extinction flash ─────────────────────────────────────────────────
const extincts = [];

function triggerExtinction(fx, fy, fz, bIdx) {
  // ── Water star explosion: particles fly in all directions ──────────
  for (let i = 0; i < 100; i++) {
    const wp = getWater();
    wp.mesh.position.set(fx + (Math.random()-0.5)*3, fy + (Math.random()-0.5)*4, fz + (Math.random()-0.5)*3);
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.random() * Math.PI;
    const spd   = 0.8 + Math.random() * 2.2;
    wp.vx = Math.sin(phi) * Math.cos(theta) * spd;
    wp.vy = Math.abs(Math.cos(phi)) * spd + 0.5; // bias upward
    wp.vz = Math.sin(phi) * Math.sin(theta) * spd;
    wp.life = 1.6;
    wp.mesh.material.opacity = 1.0;
    wp.mesh.scale.setScalar(2.5 + Math.random() * 2.5); // big bright droplets
  }

  // ── Large steam burst ─────────────────────────────────────────────
  for (let i = 0; i < 60; i++) spawnSteam(fx, fy, fz);

  // ── Blinding blue-white flash light ──────────────────────────────
  const flashLight = new THREE.PointLight(0xaaddff, 35, 80);
  flashLight.position.set(fx, fy, fz);
  scene.add(flashLight);

  // ── Expanding shockwave ring on the ground ────────────────────────
  const ringGeo = new THREE.RingGeometry(0.1, 1, 40);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x88ddff, transparent: true, opacity: 1.0,
    side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(fx, 0.15, fz);
  scene.add(ring);

  // ── Building flash ────────────────────────────────────────────────
  const bd = buildingData[bIdx];
  if (bd) bd.mat.color.setHex(0xccffff);
  extincts.push({ mat: bd ? bd.mat : null, orig: bd ? bd.origColor : 0, t: 0, flashLight, ring });

  // ── Floating score popup ──────────────────────────────────────────
  const el = document.createElement('div');
  el.textContent = '💧 +100 SAVED! 💧';
  el.style.cssText = 'position:absolute;color:#88ffff;font-size:34px;font-weight:bold;text-shadow:0 0 20px #00aaff,0 0 40px #0066ff,0 2px 8px #000;pointer-events:none;z-index:99;transform:translateX(-50%);transition:transform 1.8s ease-out,opacity 1.8s ease-out;white-space:nowrap;';
  document.body.appendChild(el);
  const popPt = new THREE.Vector3(fx, fy + 4, fz);
  function pos() {
    const v = popPt.clone().project(camera);
    el.style.left = ((v.x * 0.5 + 0.5) * innerWidth) + 'px';
    el.style.top  = ((-v.y * 0.5 + 0.5) * innerHeight) + 'px';
  }
  pos();
  setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(-90px)'; el.style.opacity = '0'; }, 80);
  const pid = setInterval(pos, 16);
  setTimeout(() => { clearInterval(pid); el.remove(); }, 1900);
}

// ── Orbit controls ───────────────────────────────────────────────────
let orbitTheta = -0.3, orbitPhi = 0.55, orbitRadius = 45;
let isDrag = false, rightDrag = false, lastMX = 0, lastMY = 0;
let userCam = false, userCamT = 0;

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
renderer.domElement.addEventListener('mousedown', e => {
  lastMX = e.clientX; lastMY = e.clientY;
  if (e.button === 0) {
    if (gameOver) { restartGame(); return; }
    mouseSpray = true;
  } else if (e.button === 2) {
    rightDrag = true;
    userCam = true; userCamT = 0;
  }
});
window.addEventListener('mousemove', e => {
  const dx = e.clientX - lastMX;
  const dy = e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  if (isDrag) {
    orbitTheta -= dx * 0.006;
    orbitPhi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, orbitPhi - dy * 0.005));
    userCamT = 0;
  }
  if (rightDrag) {
    orbitRadius = Math.max(12, Math.min(100, orbitRadius + dy * 0.2));
    userCam = true; userCamT = 0;
  }
});
window.addEventListener('mouseup', e => {
  if (e.button === 0) { mouseSpray = false; }
  if (e.button === 2) { rightDrag = false; }
});
renderer.domElement.addEventListener('wheel', e => {
  orbitRadius = Math.max(12, Math.min(100, orbitRadius + e.deltaY * 0.06));
  userCam = true; userCamT = 0;
}, { passive: true });
renderer.domElement.addEventListener('touchstart', e => {
  if (gameOver) { restartGame(); return; }
  mouseSpray = true;
}, { passive: true });
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => { mouseSpray = false; });

// ── Game state ───────────────────────────────────────────────────────
let score = 0, lives = 3, gameOver = false;
let spaceHeld = false, mouseSpray = false, truckAngle = 0;
let waterTank = 100, waterTimer = 0;
let fireTimer = 0, fireInterval = 6;
let flashTimer = 0;
const TRUCK_SPD = 0.38, WATER_DRAIN = 18, WATER_FILL = 10;

const svalEl    = document.getElementById('sval');
const lvalEl    = document.getElementById('lives-box');
const tankBar   = document.getElementById('tank-bar');
const gameoverEl= document.getElementById('gameover');
const finScore  = document.getElementById('fin-score');

function setLives() {
  lvalEl.textContent = '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3-lives));
}
setLives();

// ── Input ────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code !== 'Space' && e.key !== ' ') return;
  e.preventDefault();
  if (gameOver) { restartGame(); return; }
  spaceHeld = true;
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.key === ' ') spaceHeld = false;
});

function restartGame() {
  fires.forEach(f => scene.remove(f.group));
  fires.length = 0;
  waterPool.forEach(w => { w.active = false; w.mesh.visible = false; });
  smokePool.forEach(s => { s.active = false; s.mesh.visible = false; });
  extincts.forEach(e => e.mat.color.setHex(e.orig));
  extincts.length = 0;
  buildingData.forEach(b => b.mat.color.setHex(b.origColor));
  score = 0; lives = 3; gameOver = false; truckAngle = 0; mouseSpray = false;
  waterTank = 100; fireTimer = 0; fireInterval = 6;
  svalEl.textContent = '0'; setLives();
  gameoverEl.style.display = 'none';
  hideStream(); nozzleGlow.visible = false; nozzleLight.intensity = 0;
  camera.position.set(50, 10, -10);
  camera.lookAt(38, 2, 5);
  spawnFire(); spawnFire();
}

// ── Start immediately ────────────────────────────────────────────────
spawnFire();
spawnFire();

// ── Clock & loop ─────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.getElapsedTime();

  if (gameOver) { renderer.render(scene, camera); return; }

  // Truck movement
  truckAngle += TRUCK_SPD * dt;
  const tx = Math.cos(truckAngle) * ROAD_R;
  const tz = Math.sin(truckAngle) * ROAD_R;
  truck.position.set(tx, 0, tz);
  const nx = Math.cos(truckAngle + 0.01) * ROAD_R - tx;
  const nz = Math.sin(truckAngle + 0.01) * ROAD_R - tz;
  truck.rotation.y = Math.atan2(nx, nz);

  // Outward direction (radially away from center)
  const outX = tx / ROAD_R, outZ = tz / ROAD_R;
  // Truck's forward (travel) direction
  const fwdLen = Math.sqrt(nx * nx + nz * nz);
  const fwdX = nx / fwdLen, fwdZ = nz / fwdLen;
  // Blend: 55% outward toward buildings, 45% forward along truck nose
  const rawSX = outX * 0.55 + fwdX * 0.45;
  const rawSZ = outZ * 0.55 + fwdZ * 0.45;
  const sLen = Math.sqrt(rawSX * rawSX + rawSZ * rawSZ);
  const sprayX = rawSX / sLen, sprayZ = rawSZ / sLen;

  cannonPivot.rotation.y = Math.atan2(sprayX, sprayZ) - truck.rotation.y;

  // Flashing lights
  flashTimer += dt;
  const fOn = Math.sin(flashTimer * 12) > 0;
  redBulb.material.color.setHex(fOn ? 0xff0000 : 0x330000);
  blueBulb.material.color.setHex(!fOn ? 0x2255ff : 0x000033);

  // Water spray
  const npos = new THREE.Vector3();
  nozzle.getWorldPosition(npos);
  const outDir = new THREE.Vector3(sprayX, 0, sprayZ);

  if ((spaceHeld || mouseSpray) && waterTank > 0) {
    waterTank = Math.max(0, waterTank - WATER_DRAIN * dt);
    waterTimer += dt;
    while (waterTimer > 0.03) {
      waterTimer -= 0.03;
      for (let i = 0; i < 14; i++) spawnWater(npos, outDir);
    }
    updateStream(npos, outDir);
    nozzleGlow.position.copy(npos);
    nozzleGlow.visible = true;
    nozzleLight.position.copy(npos);
    nozzleLight.intensity = 2.5 + Math.sin(t * 20) * 0.5;
  } else {
    waterTank = Math.min(100, waterTank + WATER_FILL * dt);
    hideStream();
    nozzleGlow.visible = false;
    nozzleLight.intensity = 0;
    waterTimer = 0;
  }

  tankBar.style.width = waterTank + '%';
  tankBar.style.background = waterTank < 20
    ? 'linear-gradient(to right,#ff4400,#ffaa00)'
    : 'linear-gradient(to right,#2299ff,#88ddff)';

  // Update water particles
  for (const wp of waterPool) {
    if (!wp.active) continue;
    wp.vy -= 0.013;
    wp.mesh.position.x += wp.vx;
    wp.mesh.position.y += wp.vy;
    wp.mesh.position.z += wp.vz;
    wp.life -= dt * 1.5;
    wp.mesh.material.opacity = Math.max(0, wp.life);
    if (wp.life <= 0 || wp.mesh.position.y < -1) { wp.active = false; wp.mesh.visible = false; wp.mesh.scale.setScalar(1); continue; }

    for (let fi = fires.length - 1; fi >= 0; fi--) {
      const fire = fires[fi];
      if (wp.mesh.position.distanceTo(fire.group.position) < fire.hitRadius) {
        fire.health -= 4;
        wp.active = false; wp.mesh.visible = false;
        if (Math.random() < 0.25) spawnSmoke(fire.group.position.x, fire.group.position.y, fire.group.position.z);
        if (fire.health <= 0) {
          const fx = fire.group.position.x, fy = fire.group.position.y, fz = fire.group.position.z;
          const bi = fire.bIdx;
          scene.remove(fire.group);
          fires.splice(fi, 1);
          score += 100; svalEl.textContent = score;
          triggerExtinction(fx, fy, fz, bi);
        }
        break;
      }
    }
  }

  // Update smoke / steam
  for (const sm of smokePool) {
    if (!sm.active) continue;
    sm.mesh.position.x += sm.vx;
    sm.mesh.position.y += sm.vy;
    sm.mesh.position.z += sm.vz;
    sm.life -= dt * 0.4;
    sm.mesh.scale.setScalar(sm.scale0 * (1 + (1 - sm.life) * 1.6));
    sm.mesh.material.opacity = sm.life * 0.4;
    if (sm.life <= 0) { sm.active = false; sm.mesh.visible = false; }
  }

  // Animate fires
  for (let fi = fires.length - 1; fi >= 0; fi--) {
    const fire = fires[fi];
    fire.age += dt;
    fire.flameP.forEach((p, i) => {
      const ph = p.userData.phase + t * p.userData.spd;
      // Sway the flame tongue left/right and front/back
      p.rotation.z = Math.sin(ph * 1.6 + i * 0.5) * 0.38;
      p.rotation.x = Math.cos(ph * 1.2 + i * 0.4) * 0.22;
      // Breathe: stretch tall then squash
      const sy = 0.8 + Math.abs(Math.sin(ph * 1.9)) * 0.7;
      const sx = 0.75 + Math.sin(ph * 2.3 + i) * 0.2;
      p.scale.set(sx, sy, sx);
      // Slight vertical drift
      p.position.y = p.userData.oy + Math.sin(ph * 0.55 + i * 0.3) * 0.7;
      // Color: deep red → orange → bright yellow at peak heat
      const heat = (Math.sin(ph * 1.4 + i * 0.2) + 1) * 0.5;
      p.material.color.setRGB(1, heat * 0.68, heat * 0.06);
      // Opacity flicker
      p.material.opacity = 0.65 + Math.sin(ph * 2.1 + i) * 0.3;
    });
    fire.group.scale.setScalar(Math.min(1 + fire.age * 0.04, 3.0));
    fire.glow.intensity = 2.5 + Math.sin(t * 8 + fi) * 1.0;
    if (Math.random() < 0.07) spawnSmoke(fire.group.position.x, fire.group.position.y + 2, fire.group.position.z);

    if (fire.age > 22) {
      scene.remove(fire.group);
      fires.splice(fi, 1);
      lives--; setLives();
      if (lives <= 0) {
        gameOver = true;
        gameoverEl.style.display = 'block';
        finScore.textContent = 'Score: ' + score;
      }
    }
  }

  // Extinction effects (flash light, shockwave ring, building recolor)
  for (let i = extincts.length - 1; i >= 0; i--) {
    const e = extincts[i];
    e.t += dt;
    // Fade flash light quickly
    if (e.flashLight) {
      e.flashLight.intensity = Math.max(0, 35 * (1 - e.t * 4));
      if (e.t > 0.35) { scene.remove(e.flashLight); e.flashLight = null; }
    }
    // Expand shockwave ring and fade out
    if (e.ring) {
      e.ring.scale.setScalar(e.t * 22);
      e.ring.material.opacity = Math.max(0, 1.0 - e.t * 2.2);
      if (e.ring.material.opacity <= 0) { scene.remove(e.ring); e.ring = null; }
    }
    const p = Math.min(e.t / 2.2, 1);
    if (p >= 1) {
      if (e.mat) e.mat.color.setHex(e.orig);
      extincts.splice(i, 1);
    } else if (e.mat) {
      const r1 = ((e.orig >> 16) & 0xff) / 255;
      const g1 = ((e.orig >>  8) & 0xff) / 255;
      const b1 = ( e.orig        & 0xff) / 255;
      e.mat.color.setRGB(
        0.8 + (r1 - 0.8) * p,
        1.0 + (g1 - 1.0) * p,
        1.0 + (b1 - 1.0) * p
      );
    }
  }

  // Spawn fires
  fireTimer += dt;
  if (fireTimer >= fireInterval) {
    fireTimer = 0; spawnFire();
    fireInterval = Math.max(2.5, fireInterval * 0.95);
  }

  // Camera
  if (userCam) {
    userCamT += dt;
    if (userCamT > 5 && !isDrag) userCam = false;
    // Orbit around the truck's current position
    const cx = tx + Math.sin(orbitTheta) * Math.cos(orbitPhi) * orbitRadius;
    const cy = Math.sin(orbitPhi) * orbitRadius;
    const cz = tz + Math.cos(orbitTheta) * Math.cos(orbitPhi) * orbitRadius;
    camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.14);
    camera.lookAt(tx, 3, tz);
  } else {
    const bx = -nx / Math.sqrt(nx*nx+nz*nz);
    const bz = -nz / Math.sqrt(nx*nx+nz*nz);
    const tgt = new THREE.Vector3(tx + bx * 13, 8.5, tz + bz * 13);
    camera.position.lerp(tgt, 0.1);
    camera.lookAt(tx + fwdX * 4, 2, tz + fwdZ * 4);
    // Keep orbit angles in sync relative to truck so drag-resume feels right
    const cpRel = new THREE.Vector3(camera.position.x - tx, camera.position.y, camera.position.z - tz);
    orbitRadius = cpRel.length();
    orbitTheta  = Math.atan2(cpRel.x, cpRel.z);
    orbitPhi    = Math.asin(Math.max(-1, Math.min(1, cpRel.y / orbitRadius)));
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
